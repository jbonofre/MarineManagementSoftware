# Test configuration - use in-memory H2 database
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import-test.sql
quarkus.hibernate-orm.log.sql=false

# Disable mailer in tests
quarkus.mailer.mock=true

# Disable AI providers in tests
ai.openai.api-key=test-key
ai.openai.model=test-model
ai.anthropic.api-key=test-key
ai.anthropic.model=test-model
ai.anthropic.mcp.enabled=false

# Payment providers (disabled in tests)
payment.stripe.api-key=test-key
payment.stripe.success-url=http://localhost:8081/success
payment.stripe.cancel-url=http://localhost:8081/cancel
payment.payplug.api-key=test-key
payment.payplug.return-url=http://localhost:8081/success
payment.payplug.cancel-url=http://localhost:8081/cancel
