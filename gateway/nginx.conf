server {
    listen 80;

    location ^~ /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8080;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /client/ {
        resolver 127.0.0.11 valid=30s;
        set $client_upstream http://client-ui:80;
        proxy_pass $client_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /client {
        return 301 /client/;
    }

    location ^~ /technicien/ {
        resolver 127.0.0.11 valid=30s;
        set $technicien_upstream http://technicien-ui:80;
        proxy_pass $technicien_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /technicien {
        return 301 /technicien/;
    }

    location / {
        resolver 127.0.0.11 valid=30s;
        set $chantier_upstream http://chantier-ui:80;
        proxy_pass $chantier_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
